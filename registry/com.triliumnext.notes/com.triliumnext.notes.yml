id: com.triliumnext.notes
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
# Electron app: use the Electron base app, which ships zypak. zypak redirects
# Chromium's SUID sandbox onto the Flatpak sandbox so the app keeps an internal
# sandbox, run through zypak's default entrypoint (the wrapper execs
# zypak-wrapper). The base is a prebuilt ref merged into the app at build time;
# the app stays self-contained.
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: trilium
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Electron (Chromium) note-taking / knowledge-base app. The prebuilt build
  # bundles Chromium and its own ffmpeg/ANGLE/SwiftShader; the GTK3, NSS, CUPS,
  # ATK, dbus and X11 stacks it links come from the runtime
  # (org.freedesktop.Platform 25.08 ships them — verified against the binary's
  # NEEDED set, 0 missing).
  - --share=ipc
  # Local-first: the desktop app keeps its own SQLite document store and works
  # fully offline. Network is only for optional sync to a self-hosted / cloud
  # Trilium server and for fetching remote images pasted into notes.
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Desktop notifications (reminders / task due-dates).
  - --talk-name=org.freedesktop.Notifications
  # Encrypt the stored protected-notes / sync credentials (Electron safeStorage)
  # via the Secret Service when a keyring is present.
  - --talk-name=org.freedesktop.secrets
  # Strip a leaked ELECTRON_RUN_AS_NODE from the sandbox env so the binary — and
  # zypak's spawned child/zygote processes, which the wrapper's own `unset`
  # can't reach — always start as the GUI app rather than as plain Node.
  - --unset-env=ELECTRON_RUN_AS_NODE
  # Note import/export (Markdown, HTML, ENEX, attachments) goes through the
  # desktop portal, so no broad --filesystem grant is needed by default. The
  # note database lives inside the sandbox under the per-app HOME
  # (~/.var/app/com.triliumnext.notes). Deliberately NOT granted (users opt in
  # per the metainfo notes via `flatpak override`):
  #   --filesystem=home  -> point TRILIUM_DATA_DIR at a shared/host location
modules:
  - name: trilium
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 trilium-wrapper /app/bin/trilium
      - install -Dm644 com.triliumnext.notes.desktop /app/share/applications/com.triliumnext.notes.desktop
      - install -Dm644 com.triliumnext.notes.metainfo.xml /app/share/metainfo/com.triliumnext.notes.metainfo.xml
      - install -Dm644 com.triliumnext.notes.png /app/share/icons/hicolor/256x256/apps/com.triliumnext.notes.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: trilium.deb
        only-arches:
          - x86_64
        url: https://github.com/TriliumNext/Trilium/releases/download/v0.103.0/TriliumNotes-v0.103.0-linux-x64.deb
        sha256: 15cd7a2c4ea01d0198d32e7f128069909a7fec0abda33a1436872bd22b7cf185
        size: 143489658
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: trilium-wrapper
      - type: file
        path: com.triliumnext.notes.desktop
      - type: file
        path: com.triliumnext.notes.metainfo.xml
      - type: file
        path: com.triliumnext.notes.png
